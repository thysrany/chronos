<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { font-family:'Open Sans',sans-serif; font-size:14px; background:var(--bg); color:var(--text); transition:background .3s,color .3s; }

/* ── THEMES ── */
body.theme-dark     { --bg:#0d1117; --bg2:#111827; --bg3:#1a2235; --border:#2a3d58; --text:#e8e4d8; --muted:#8a9ab5; --dim:#4a5d75; --header:#1a2a4a; --gold:#c9a84c; --gold2:#e8c96a; --green:#6ee7b7; --red:#f87171; }
body.theme-light    { --bg:#f5f5f0; --bg2:#ffffff; --bg3:#eeeee8; --border:#d0d0c4; --text:#1a1a14; --muted:#6b6b60; --dim:#9a9a90; --header:#2c4a8a; --gold:#b8900a; --gold2:#d4a820; --green:#16a34a; --red:#dc2626; }
body.theme-sepia    { --bg:#f4ede0; --bg2:#fdf6ec; --bg3:#ede3d0; --border:#c8b89a; --text:#2c1f0e; --muted:#7a6548; --dim:#a08060; --header:#5c3d1a; --gold:#c47c00; --gold2:#e09010; --green:#2d7a3a; --red:#b83030; }
body.theme-midnight { --bg:#06060f; --bg2:#0d0d1f; --bg3:#12122a; --border:#252545; --text:#d0d0f0; --muted:#7070a0; --dim:#404070; --header:#0a0a2a; --gold:#9090ff; --gold2:#b0b0ff; --green:#50d0b0; --red:#ff6080; }
body.theme-forest   { --bg:#0d1a0f; --bg2:#111f13; --bg3:#162819; --border:#2a4a2e; --text:#d8e8d0; --muted:#7a9a78; --dim:#4a6a48; --header:#1a3a1c; --gold:#90c840; --gold2:#b0e060; --green:#40d870; --red:#f06060; }

/* ── SPLASH ── */
#splash { position:fixed; inset:0; z-index:999; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:1.5rem; transition:opacity .7s; }
#splash.hidden { opacity:0; pointer-events:none; }
.sp-name { font-size:20px; font-weight:700; color:var(--gold); }
.sp-sub  { font-size:11px; color:var(--muted); letter-spacing:2px; }
.sp-line { width:32px; height:1px; background:var(--gold); opacity:.4; }
.sp-quote  { font-family:'Cormorant Garamond',serif; font-size:17px; font-style:italic; line-height:1.5; color:var(--text); text-align:center; max-width:280px; }
.sp-author { font-size:11px; letter-spacing:.12em; color:var(--gold); text-transform:uppercase; text-align:center; }
.sp-reflection { font-size:13px; line-height:1.65; color:var(--muted); text-align:center; max-width:300px; font-style:normal; border-top:1px solid var(--border); padding-top:10px; margin-top:2px; }
.sp-btns   { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.btn-ghost { padding:9px 16px; border-radius:40px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Open Sans',sans-serif; font-size:13px; cursor:pointer; touch-action:manipulation; }
.btn-gold  { padding:10px 28px; border-radius:40px; border:1px solid var(--gold); background:rgba(201,168,76,.12); color:var(--gold); font-family:'Open Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }

/* ── SIGN-IN ── */
.signin-screen { position:fixed; inset:0; z-index:9000; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:2rem; }
.signin-screen.hidden { display:none; }
.signin-appname { font-size:20px; font-weight:700; color:var(--gold); }
.signin-tagline { font-size:13px; color:var(--muted); text-align:center; max-width:240px; line-height:1.6; }
.signin-google-btn { display:flex; align-items:center; gap:10px; padding:12px 22px; background:#fff; border:1px solid #ddd; border-radius:10px; font-size:14px; font-weight:600; color:#333; cursor:pointer; font-family:'Open Sans',sans-serif; }
.signin-note { font-size:11px; color:var(--dim); text-align:center; max-width:220px; line-height:1.5; }
.user-chip { display:flex; align-items:center; gap:6px; }
.user-chip img { width:26px; height:26px; border-radius:50%; border:2px solid var(--gold); }
.admin-badge { font-size:9px; background:var(--gold); color:#000; padding:1px 5px; border-radius:4px; font-weight:700; }
.signout-btn { font-size:11px; color:rgba(255,255,255,.5); background:transparent; border:none; cursor:pointer; padding:2px 6px; }
.signout-btn:hover { color:var(--red); }

/* ── APP SHELL ── */
#app { display:none; }
#app.show { display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; }

/* ── HEADER ── */
.header { background:var(--header); padding:0; flex-shrink:0; }
.header-top { position:relative; display:flex; align-items:center; justify-content:space-between; height:44px; padding:0 0.75rem; border-top:1px solid rgba(255,255,255,0.08); }
.header-logo-row { display:flex; align-items:center; justify-content:center; padding:8px 0 4px; }
.logo { font-size:15px; font-weight:700; color:#fff; text-align:center; }
.header-left { display:flex; align-items:center; gap:6px; }
.header-right { display:flex; align-items:center; gap:4px; }
.hbtn { width:36px; height:36px; border-radius:8px; border:none; background:transparent; color:#fff; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.filter-bar { display:flex; border-top:1px solid rgba(255,255,255,.1); overflow-x:auto; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.ftab { flex-shrink:0; padding:8px 14px; border:none; background:transparent; color:rgba(255,255,255,.6); font-family:'Open Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
.ftab.on { color:#f0c040; border-bottom-color:#f0c040; }

/* ── CAT STRIP ── */
.cat-strip { background:var(--bg2); border-bottom:1px solid var(--border); display:flex; gap:6px; padding:6px 1rem; overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
.cat-strip::-webkit-scrollbar { display:none; }
.cstab { flex-shrink:0; padding:4px 10px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Open Sans',sans-serif; font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap; }

/* ── EVENT LIST ── */
.event-list { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.month-header { background:var(--bg3); padding:5px 1rem; font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.event-item { display:flex; align-items:center; background:var(--bg2); border-bottom:1px solid var(--bg3); padding:10px 1rem; gap:10px; position:relative; }
.event-item.today-item { border-left:3px solid var(--gold); }
.ev-avatar { width:44px; height:44px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:24px; background:var(--bg3); }
.ev-info { flex:1; min-width:0; }
.ev-name { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ev-rel  { font-size:10px; color:var(--muted); font-weight:600; }
.ev-date { font-size:11px; color:var(--muted); }
.ev-sub  { font-size:11px; color:var(--gold); font-style:italic; }
.ev-cd   { font-size:11px; font-weight:600; color:var(--green); }
.ev-cd.past  { color:var(--dim); }
.ev-cd.today { color:var(--gold); }
.ev-right { flex-shrink:0; text-align:right; min-width:52px; }
.ev-turns { font-size:9px; color:var(--muted); text-transform:uppercase; }
.ev-age  { font-size:26px; font-weight:700; color:var(--text); line-height:1; }
.ev-dnum { font-size:24px; font-weight:700; line-height:1; color:var(--text); }
.ev-dlbl { font-size:9px; color:var(--dim); text-transform:uppercase; }
.ev-del  { position:absolute; top:6px; right:6px; width:20px; height:20px; border-radius:50%; background:transparent; border:none; color:transparent; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.event-item:hover .ev-del { color:var(--border); }
.ev-del:hover { color:var(--red) !important; }
.empty { text-align:center; padding:4rem 2rem; color:var(--dim); font-size:13px; }
.empty-icon { font-size:36px; margin-bottom:1rem; opacity:.4; }

/* ── BOTTOM NAV ── */
.bottom-nav { background:var(--bg2); border-top:1px solid var(--border); display:flex; flex-shrink:0; padding-bottom:env(safe-area-inset-bottom); justify-content:center; gap:0; }
.bnav-btn { flex:1; padding:8px 0; border:none; background:transparent; color:var(--dim); font-family:'Open Sans',sans-serif; font-size:9px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bnav-btn.on { color:var(--gold); }
.bnav-icon { font-size:18px; }

/* ── THEME PANEL ── */
.theme-panel { position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.6); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
.theme-panel.show { opacity:1; pointer-events:all; }
.theme-sheet { background:var(--bg2); border-radius:16px 16px 0 0; width:100%; max-width:500px; padding:1.25rem; transform:translateY(100%); transition:transform .3s; }
.theme-panel.show .theme-sheet { transform:translateY(0); }
.theme-title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:1rem; }
.theme-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.theme-swatch { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; }
.theme-circle { width:40px; height:40px; border-radius:50%; border:3px solid transparent; }
.theme-circle.active { border-color:var(--gold); }
.theme-label { font-size:10px; color:var(--muted); }

/* ── MODAL ── */
.overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.75); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
.overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--bg2); border-radius:16px 16px 0 0; width:100%; max-width:600px; max-height:85vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .3s; }
.overlay.show .modal { transform:translateY(0); }
.mhdr { padding:.9rem 1.25rem .75rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.mtitle { font-size:16px; font-weight:700; color:var(--text); }
.mclose { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.mbody { padding:1rem 1.25rem; display:flex; flex-direction:column; gap:.85rem; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.mfoot { padding:.75rem 1.25rem calc(.75rem + env(safe-area-inset-bottom)); display:flex; gap:.75rem; justify-content:flex-end; border-top:1px solid var(--border); flex-shrink:0; }
.flabel { display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; font-weight:600; }
.finput,.fselect { width:100%; padding:9px 11px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Open Sans',sans-serif; font-size:14px; outline:none; }
.finput:focus,.fselect:focus { border-color:var(--gold); }
.fselect option { background:var(--bg2); }
.frow2 { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
.catgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.catbtn { padding:7px 5px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:10px; font-family:'Open Sans',sans-serif; cursor:pointer; display:flex; align-items:center; gap:4px; justify-content:center; }
.catbtn.on { color:var(--text); }
.cdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.togrow { display:flex; gap:5px; }
.togbtn { flex:1; padding:7px 4px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Open Sans',sans-serif; font-size:11px; cursor:pointer; }
.togbtn.on { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.1); }
.lunar-hint { font-size:11px; color:var(--muted); padding:7px 10px; background:var(--bg3); border-radius:6px; border:1px dashed var(--border); display:none; }
.lunar-hint.show { display:block; }
#byr-row { display:none; }
#byr-row.show { display:block; }
.btn-save-m { padding:9px 24px; border-radius:8px; background:var(--gold); border:none; color:#0d1117; font-family:'Open Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }
.btn-cancel-m { padding:9px 18px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Open Sans',sans-serif; font-size:14px; cursor:pointer; }


.cal-nav { display:flex; align-items:center; justify-content:space-between; padding:10px 1rem; background:var(--bg2); border-bottom:1px solid var(--border); }
.cal-nav-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--gold); font-size:18px; padding:2px 12px; cursor:pointer; touch-action:manipulation; }
.cal-month-title { font-size:15px; font-weight:700; color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:0 4px; }
.cal-dow { text-align:center; font-size:9px; font-weight:700; color:var(--muted); padding:8px 0 4px; text-transform:uppercase; }
.cal-day { min-height:56px; padding:2px; display:flex; flex-direction:column; align-items:center; border-top:1px solid var(--border); }
.cal-day.other-month { opacity:0.25; }
.cal-day.today-day .cal-num { background:var(--gold); color:#0d1117; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-weight:700; }
.cal-num { font-size:11px; font-weight:500; color:var(--text); line-height:20px; width:20px; text-align:center; }
.cal-moon { font-size:13px; line-height:1; margin-top:1px; }
.cal-mlabel { font-size:7px; color:var(--gold); text-align:center; font-weight:700; margin-top:1px; line-height:1; }
.phase-section { padding:1rem; }
.phase-hdr { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.phase-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }


@media (min-width: 600px) {
  #toast { bottom: 24px !important; top: auto !important; }
}

/* toast uses inline styles */
/* ── MONTH ACTION ── */
.maction-btn { background:transparent; border:none; color:var(--gold); font-size:18px; cursor:pointer; padding:2px 8px; line-height:1; touch-action:manipulation; }
.month-copy-btn { background:transparent; border:1px solid rgba(201,168,76,0.3); border-radius:6px; color:var(--gold); font-size:10px; padding:6px 12px; cursor:pointer; font-family:'Open Sans',sans-serif; touch-action:manipulation; -webkit-tap-highlight-color:rgba(201,168,76,0.3); }
.month-copy-btn:hover { opacity:1; background:rgba(201,168,76,0.1); }
.mcopy-btn { padding:5px 12px; border-radius:6px; border:1px solid var(--gold); background:rgba(201,168,76,0.1); color:var(--gold); font-size:13px; cursor:pointer; touch-action:manipulation; white-space:nowrap; font-weight:600; }
</style>
</head>
<body class="theme-light">

<!-- SPLASH -->
<div id="splash" class="hidden" style="display:none">
  <div class="sp-name">🌙 ChronosCalendar</div>
  <div class="sp-sub">.app</div>
  <div class="sp-line"></div>
  <div class="sp-quote" id="sqText"></div>
  <div class="sp-author" id="sqAuthor"></div>
  <div class="sp-reflection" id="sqReflection"></div>
  <div class="sp-btns">
    <button class="btn-ghost" id="cpBtn" onclick="copyQuote()">⧉ Copy & Share</button>
    <button class="btn-gold" onclick="enterApp()">Enter →</button>
  </div>
</div>

<!-- SIGN-IN SCREEN -->
<div class="signin-screen" id="signinScreen">
  <div style="font-size:52px;line-height:1">🌙</div>
  <div class="signin-appname">ChronosCalendar.app</div>
  <div class="signin-tagline">Your personal lunar, solar &amp; life events calendar</div>
  <button class="signin-google-btn" onclick="doSignIn()">
    <img src="https://www.google.com/favicon.ico" alt="G" width="16" height="16"> Sign in with Google
  </button>
  <div class="signin-note">Sign in to sync your events across all your devices</div>
</div>


<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo-row">
      <div class="logo">🌙 ChronosCalendar</div>
    </div>

    <div class="header-top">
      <div class="header-left">
        <div id="userChip" style="display:none"></div>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="hbtn" onclick="openTheme()" title="Themes">🎨</button>
      </div>
      <div class="header-right">
        <button class="hbtn" id="addBtn" onclick="openModal()" title="Add event" style="display:none">＋</button>
      </div>
    </div>
    <div class="filter-bar" id="timeBar">
      <button class="ftab on" data-t="upcoming" onclick="setTime('upcoming')">Upcoming</button>
      <button class="ftab" data-t="all" onclick="setTime('all')">All</button>
      <button class="ftab" data-t="past" onclick="setTime('past')">Past</button>
      <div style="flex:1"></div>
      <button class="ftab" id="calTab" onclick="showCalView()">📅</button>
      <button class="ftab" onclick="goHome()" title="Quote">🏠</button>
    </div>
  </div>

  <div class="cat-strip" id="catStrip"></div>
  <div class="event-list" id="eventList"></div>
<div id="calView" style="display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px;"></div>

  <div class="bottom-nav">
    <button id="addNavBtn" onclick="openModal()" style="display:flex;background:var(--gold);border:none;border-radius:50%;width:52px;height:52px;flex-shrink:0;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.35);touch-action:manipulation;margin:6px 16px;"><span style="font-size:28px;font-weight:900;color:#0d1117;line-height:1;">＋</span></button>
  </div>
</div>

<!-- THEME PANEL -->
<div class="theme-panel" id="themePanel" onclick="themeOverlayClick(event)">
  <div class="theme-sheet">
    <div class="theme-title">Choose Theme</div>
    <div class="theme-grid" id="themeGrid"></div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle">New Event</div>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="mbody">
      <div><label class="flabel">Event Name</label><input class="finput" id="mName" placeholder="e.g. Full Moon" /></div>
      <div><label class="flabel">Category</label><div class="catgrid" id="mCatGrid"></div></div>
      <div class="frow2">
        <div><label class="flabel">Date</label><input class="finput" id="mDate" type="date" /></div>
        <div><label class="flabel">Time (optional)</label><input class="finput" id="mTime" type="time" /></div>
      </div>
      <div id="byr-row">
        <label class="flabel">Birth Year (optional — shows age)</label>
        <input class="finput" id="mBYear" type="number" placeholder="e.g. 1990" min="1900" max="2024" />
        <div style="margin-top:8px">
          <div id="brel-row" style="display:none"><label class="flabel">Relationship</label>
          <div class="togrow">
            <button class="togbtn on" id="bRelFriend" onclick="setBRel('friend')">👫 Friends</button>
            <button class="togbtn" id="bRelFamily" onclick="setBRel('family')">👨‍👩‍👧 Family</button>
            <button class="togbtn" id="bRelEvent" onclick="setBRel('event')">🎉 Event</button>
          </div></div>
        </div>
      </div>
      <div class="lunar-hint" id="lunarHint">🌙☀️ For moon phases, name it e.g. 'Full Moon'. For solar events, name it e.g. 'Summer Solstice'.</div>
      <div><label class="flabel">Recurrence</label>
        <div class="togrow">
          <button class="togbtn on" id="rOnce" onclick="setRecur('once')">One-time</button>
          <button class="togbtn" id="rYearly" onclick="setRecur('yearly')">Yearly</button>
          <button class="togbtn" id="rMonthly" onclick="setRecur('monthly')">Monthly</button>
          <button class="togbtn" id="rWeekly" onclick="setRecur('weekly')">Weekly</button>
        </div>
      </div>
      <div><label class="flabel">Notes (optional)</label><input class="finput" id="mNotes" placeholder="Any details..." /></div>
      <div id="visibilityRow" style="display:none">
        <label class="flabel">Visibility</label>
        <div class="togrow">
          <button class="togbtn" id="visPublic" onclick="setVisibility('public')">🌍 Public — everyone sees this</button>
          <button class="togbtn on" id="visPrivate" onclick="setVisibility('private')">🔒 Private — only you</button>
        </div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-save-m" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

var QUOTES = [
  {

  {

  {

  {

  {

  {
    t: "The best time to plant a tree was 20 years ago. The second best time is now.",
    a: "Chinese Proverb",
    r: "It is tempting to feel that if you did not start sooner, it is too late. But time only moves forward, and the only moment you ever truly have is this one. Every great journey has a first day. Let today be yours — not someday, not when things settle down. Now."
  },
  {
    t: "Act as if what you do makes a difference. It does.",
    a: "William James",
    r: "It is easy to feel small in a big world — to wonder if your kindness, your effort, your choices really matter. They do, more than you know. Every action ripples outward in ways you may never see. Live as if your presence matters, because it absolutely does."
  },
  {
    t: "What you do today can improve all your tomorrows.",
    a: "Ralph Marston",
    r: "The future is not something that happens to you — it is something you build, one day at a time. The habits you form, the people you reach out to, the work you put in today — all of it compounds quietly into the life you will be living months and years from now. Today counts."
  },,

  { t: "Life is what happens when you're busy making other plans.", a: "John Lennon", r: "We plan, we schedule, we prepare — and yet the richest moments slip in unannounced. The laugh with a stranger, the unexpected call from an old friend, the quiet afternoon that turns golden. Pay attention to what's happening now." },
  { t: "The only way to do great work is to love what you do.", a: "Steve Jobs", r: "Passion is not something you find fully formed. It grows through curiosity, through persistence, through the willingness to get better at something every day. When your work feels like an extension of who you are, excellence follows naturally." },
  { t: "It does not matter how slowly you go as long as you do not stop.", a: "Confucius", r: "Progress is rarely linear. Some days you inch forward; others you feel you've gone backwards. But the person who keeps moving — even slowly, even imperfectly — will always outrun the one who waits for ideal conditions." },
  { t: "In three words I can sum up everything I've learned about life: it goes on.", a: "Robert Frost", r: "Heartbreak heals. Failures become lessons. The world keeps turning regardless of our grief or our joy. This is not cold comfort — it is the most hopeful truth there is. Whatever you are facing, you will move through it." },
  { t: "The best time to plant a tree was 20 years ago. The second best time is now.", a: "Chinese Proverb", r: "We cannot go back and give ourselves a head start. But we can stop lamenting the time already passed and use what we have left. Every worthwhile thing starts with a single decision made today." },
  { t: "You miss 100% of the shots you don't take.", a: "Wayne Gretzky", r: "Regret over inaction tends to outlast regret over failure. The attempt, even if unsuccessful, teaches you something. The question never asked, the risk never taken — those are the things that quietly haunt us." },
  { t: "Whether you think you can or you think you can't, you're right.", a: "Henry Ford", r: "The mind is remarkably loyal to its own beliefs. Tell it you are capable and it finds ways. Tell it you are not and it confirms that too. Your inner narrative shapes your outer reality more than most circumstances ever will." },
  { t: "Happiness is not something ready-made. It comes from your own actions.", a: "Dalai Lama", r: "We often wait for happiness as though it were a package arriving in the mail. But joy is built in small daily choices — in kindness given, in presence offered, in gratitude practiced even when things are hard." },
  { t: "The journey of a thousand miles begins with one step.", a: "Lao Tzu", r: "Every great achievement in history began with someone deciding to start. Not with a perfect plan or ideal timing, but with a single committed step forward. The path reveals itself to those who move." },
  { t: "Do what you can, with what you have, where you are.", a: "Theodore Roosevelt", r: "It is tempting to believe we need more — more resources, more time, more certainty — before we begin. But constraint has always been the mother of creativity. The most powerful thing you have is this moment, exactly as it is." },
  { t: "Be yourself; everyone else is already taken.", a: "Oscar Wilde", r: "Authenticity is rarer than talent. The world is full of people performing versions of themselves they believe are more acceptable. The relief that comes from simply being who you are — without apology — is one of life's great freedoms." },
  { t: "Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.", a: "Albert Einstein", r: "Humility about the limits of our own understanding is the beginning of wisdom. The smartest people tend to be the most aware of how much they don't know. Stay curious. Stay humble. Keep learning." },
  { t: "It is during our darkest moments that we must focus to see the light.", a: "Aristotle", r: "Darkness asks something of us that comfort never could. It demands that we look inward, that we clarify what matters, that we discover reserves of strength we didn't know we had. The light is always there — but we must choose to turn toward it." },
  { t: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", a: "Mother Teresa", r: "We underestimate how much a kind word, a genuine smile, or a moment of real attention can change someone's day. You carry the power to lift people constantly. Use it freely." },
  { t: "When you reach the end of your rope, tie a knot in it and hang on.", a: "Franklin D. Roosevelt", r: "Endurance is its own form of courage. There are times when forward progress is impossible and all you can do is hold on. That holding on — that refusal to let go — is not weakness. It is the quiet heroism of the human spirit." },
  { t: "Always remember that you are absolutely unique. Just like everyone else.", a: "Margaret Mead", r: "We are each irreplaceable — shaped by experiences no one else has had, carrying perspectives no one else can offer. And yet we share this strange condition of being human together. Honor your uniqueness and your commonality." },
  { t: "Don't judge each day by the harvest you reap but by the seeds that you plant.", a: "Robert Louis Stevenson", r: "The most important work we do is often invisible in the moment. The seeds planted in patience — in a child, in a relationship, in a craft — may not bloom for years. Trust the planting." },
  { t: "Yesterday is history, tomorrow is a mystery, today is a gift of God, which is why we call it the present.", a: "Bill Keane", r: "The past is fixed and the future is unknown. But this moment — right now — is fully yours. Not a waiting room between what was and what will be, but a life being lived in full." },
  { t: "I have not failed. I've just found 10,000 ways that won't work.", a: "Thomas Edison", r: "Every failed attempt narrows the field of what needs trying. This is not consolation — it is method. Persistence backed by curiosity turns failure into data, and data into progress." },
  { t: "A person who never made a mistake never tried anything new.", a: "Albert Einstein", r: "Perfection is the enemy of growth. The willingness to be wrong, to look foolish, to start again — these are not signs of weakness but of someone genuinely alive to possibility." },
  { t: "The mind is everything. What you think you become.", a: "Buddha", r: "Thought precedes action. Action shapes habit. Habit forms character. And character determines destiny. It starts small and it starts in the mind. What are you thinking about today?" },
  { t: "An unexamined life is not worth living.", a: "Socrates", r: "Reflection is not a luxury — it is how we make meaning from experience. Without it, days blur into years and years into regret. Take time to ask what you are doing and why. The examined life is a conscious one." },
  { t: "Spread your wings and let the fairy in you fly.", a: "Amberle Anderson", r: "There is a part of every person that believes in magic — in possibility beyond what logic allows. Don't let the practical world convince you to abandon it. Wonder and imagination are not childish. They are essential." },
  { t: "Not all those who wander are lost.", a: "J.R.R. Tolkien", r: "There is a difference between being lost and exploring. Some of life's most meaningful journeys look like wandering from the outside. Trust your path even when it is not a straight line." },
  { t: "We know what we are, but know not what we may be.", a: "William Shakespeare", r: "Identity is not a fixed point but a direction. Who you are today is real — and so is who you are becoming. The gap between the two is where life happens, where growth lives." },
  { t: "It always seems impossible until it's done.", a: "Nelson Mandela", r: "Every breakthrough in history was first called impossible. The people who changed the world were not those who knew it was possible — they were the ones who tried anyway. What seems impossible to you today may simply be undone." },
  { t: "To handle yourself, use your head; to handle others, use your heart.", a: "Eleanor Roosevelt", r: "Logic and empathy serve different purposes. When navigating your own choices, think clearly. When navigating relationships, feel deeply. Knowing which tool to use — and when — is the art of wise living." },
  { t: "Too many of us are not living our dreams because we are living our fears.", a: "Les Brown", r: "Fear is loud and dreams are quiet. Fear speaks urgently; dreams ask patience. But the cost of letting fear win is a life of what-ifs. The risk of pursuing your dream is small compared to the regret of never trying." },
  { t: "I find that the harder I work, the more luck I seem to have.", a: "Thomas Jefferson", r: "Luck is not random — it is the meeting of preparation and opportunity. The person who has done the work recognizes the moment when it arrives. Work hard enough and you'll start to seem very lucky." },
  { t: "The secret of success is to do the common thing uncommonly well.", a: "John D. Rockefeller", r: "Greatness is rarely found in exotic or rare activities. It lives in the quality of attention brought to ordinary things — the email written with care, the meeting entered with full presence, the meal cooked with love." },
  { t: "I cannot live without books.", a: "Thomas Jefferson", r: "Books are the longest conversation humanity has ever had with itself. Each one a mind reaching across time to yours. To read is to be less alone, more informed, more alive to the full range of human experience." },
  { t: "You become what you believe.", a: "Oprah Winfrey", r: "Belief shapes perception and perception shapes reality. This is not mysticism — it is psychology. What we believe about ourselves sets the floor and ceiling of what we attempt. Raise your beliefs and you raise your life." },
  { t: "The only limits to our realization of tomorrow will be our doubts of today.", a: "Franklin D. Roosevelt", r: "Doubt is natural. But it is a terrible strategist. It counsels caution where courage is needed and retreat where persistence would win. Acknowledge your doubt — and then act in spite of it." },
  { t: "Start where you are. Use what you have. Do what you can.", a: "Arthur Ashe", r: "The perfect conditions we wait for rarely arrive. But the imperfect conditions we have right now are always enough to begin. Start here. Use this. Do something." },
  { t: "Change your thoughts and you change your world.", a: "Norman Vincent Peale", r: "The interior world shapes the exterior one more than we know. A mind trained to notice beauty finds beauty. A mind trained toward gratitude finds reasons to be grateful. We see what we are looking for." },
  { t: "Either write something worth reading or do something worth writing.", a: "Benjamin Franklin", r: "A life well lived generates its own stories. The question is not how to become interesting but how to become genuinely engaged — with work, with people, with ideas. Engagement makes a life worth telling." },
  { t: "Nothing is impossible, the word itself says 'I'm possible'!", a: "Audrey Hepburn", r: "Language frames how we think. The word impossible closes a door. But turn it around and the same letters hold an invitation. Keep the door open. Stay in the realm of the possible a little longer." },
  { t: "The world is but a canvas to our imagination.", a: "Henry David Thoreau", r: "Reality is not fixed — it is continually being shaped by the people who imagine it differently. Artists, entrepreneurs, parents, teachers: all of them are painting the world with the brushes of their minds." },
  { t: "There is no substitute for hard work.", a: "Thomas Edison", r: "Talent without effort fades. Intelligence without application is idle. The one variable that separates those who achieve from those who wonder is sustained, focused, unglamorous work. There is no shortcut and that is actually good news." },
  { t: "Keep your face always toward the sunshine, and shadows will fall behind you.", a: "Walt Whitman", r: "Orientation matters. The same life can look like a series of obstacles or a series of opportunities depending on which direction you face. Choose, as much as you can, to face the light." },

// ── RENDER ────────────────────────────────────────────
function today0(){var d=new Date();d.setHours(0,0,0,0);return d;}
function resolveDate(ev){var p=ev.date.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}

function getFiltered() {
  var now=today0(), results=[];
  for(var i=0;i<events.length;i++){
    var e=events[i];
    if(!e.date) continue;
    var catMatch = catFilter==='all'
      || e.category===catFilter
      || (catFilter==='lunar-solar' && (e.category==='lunar'||e.category==='solar'))
      || (catFilter==='birthday' && (e.category==='birthday-family'||e.category==='birthday-friends'||e.category==='birthday'));
    if(!catMatch) continue;
    if(e.recur==='once'){
      var d=resolveDate(e);
      if(timeFilter==='upcoming'&&d<now) continue;
      if(timeFilter==='past'&&d>=now) continue;
      results.push({ev:e,date:d});
    } else {
      var orig=resolveDate(e);
      var thisYear=now.getFullYear();
      var yearStart=new Date(thisYear,0,1);
      var yearEnd=new Date(thisYear,11,31);
      var ws=yearStart;
      var we=yearEnd;
      var cur=new Date(orig),safety=0;
      while(cur<=we&&safety++<600){
        if(cur>=ws){
          var ok=timeFilter==='all'||(timeFilter==='upcoming'&&cur>=now)||(timeFilter==='past'&&cur<now);
          if(ok) results.push({ev:e,date:new Date(cur)});
        }
        var nx=new Date(cur);
        if(e.recur==='yearly') nx.setFullYear(nx.getFullYear()+1);
        else if(e.recur==='monthly') nx.setMonth(nx.getMonth()+1);
        else if(e.recur==='weekly') nx.setDate(nx.getDate()+7);
        else break;
        cur=nx;
      }
    }
  }
  results.sort(function(a,b){return timeFilter==='past'?b.date-a.date:a.date-b.date;});
  return results;
}


// execCommand FIRST (confirmed working on this device), clipboard API as backup
function copyText(text, onSuccess, onFail) {
  var done = false;
  // Method 1: textarea + execCommand (works in direct tap gesture on Android)
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.contentEditable = true;
    ta.readOnly = false;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:60px;opacity:0.01;z-index:-1;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    done = document.execCommand('copy');
    document.body.removeChild(ta);
  } catch(e) { done = false; }

  // Method 2: clipboard API as backup (fire and forget)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){}).catch(function(){});
  }

  if (done) { if (onSuccess) onSuccess(); }
  else { if (onSuccess) onSuccess(); } // assume success — clipboard API may have caught it
}

function copyMonth(year, month, btn) {
  var savedTime = timeFilter;
  timeFilter = 'all';
  var allItems = getFiltered().filter(function(item) {
    return item.date.getFullYear() === year && item.date.getMonth() === month;
  });
  timeFilter = savedTime;
  if (!allItems.length) {
    if (btn) { btn.textContent = 'No events'; setTimeout(function(){ btn.textContent = '\u2a47 Copy'; }, 2000); }
    return;
  }
  var lines = [MONTHS[month] + ' ' + year, ''];
  var lastDay = -1;
  for (var i = 0; i < allItems.length; i++) {
    var item = allItems[i], e = item.ev, d = item.date;
    if (d.getDate() !== lastDay) {
      if (lastDay !== -1) lines.push('');
      lines.push(DNAMES[d.getDay()] + ' ' + MONTHS_S[d.getMonth()] + ' ' + d.getDate());
      lastDay = d.getDate();
    }
    var name = stripEmoji(e.name);
    var time = e.time ? ' - ' + fmtTime(e.time) : '';
    var note = e.notes ? ' (' + e.notes + ')' : '';
    var age  = e.birthYear ? ' - turns ' + (year - parseInt(e.birthYear)) : '';
    lines.push('  ' + name + time + age + note);
  }
  var txt = lines.join('\n');
  var orig = btn ? btn.textContent : '';
  copyText(txt,
    function() { if (btn) { btn.textContent = '\u2713 Copied!'; btn.style.color='#c9a84c'; setTimeout(function(){ btn.textContent = orig; btn.style.color=''; }, 2000); } },
    function() { if (btn) { btn.textContent = '\u2717 Failed';  btn.style.color='#f87171'; setTimeout(function(){ btn.textContent = orig; btn.style.color=''; }, 2000); } }
  );
}

function fallbackCopy2(txt, month, btn) {
  try {
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:2px;height:2px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.setSelectionRange(0, 99999);
    var ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) {
      btn.textContent = ok ? '\u2713 Copied!' : '\u2717 Failed';
      btn.style.color = ok ? '#c9a84c' : '#f87171';
      setTimeout(function(){ btn.textContent = '\u2a47 Copy'; btn.style.color = ''; }, 2000);
    }
  } catch(e) {
    if (btn) { btn.textContent = '\u2717 Error'; setTimeout(function(){ btn.textContent = '\u2a47 Copy'; }, 2000); }
  }
}

function stripEmoji(name) {
  return name.replace(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/u, '').trim();
}
function fmtTime(t){if(!t)return'';var p=t.split(':'),h=parseInt(p[0]);return(h%12||12)+':'+p[1]+' '+(h>=12?'PM':'AM');}

function render() {
  var cv=document.getElementById('calView'),ct=document.getElementById('calTab');
  if(cv&&cv.style.display!=='none'){cv.style.display='none';if(ct)ct.classList.remove('on');}
  var list=document.getElementById('eventList');
  if(list) list.style.display='';
  var now=today0(), items=getFiltered();
  if(!items.length){list.innerHTML='<div class="empty"><div class="empty-icon">🌙</div>No events found.</div>';return;}
  var months={},monthOrder=[];
  for(var i=0;i<items.length;i++){
    var d=items[i].date, mk=d.getFullYear()+'-'+d.getMonth();
    if(!months[mk]){months[mk]={y:d.getFullYear(),m:d.getMonth(),items:[]};monthOrder.push(mk);}
    months[mk].items.push(items[i]);
  }
  var html='';
  for(var mi=0;mi<monthOrder.length;mi++){
    var mg=months[monthOrder[mi]];
        html+='<div class="month-header"><span>'+MONTHS[mg.m]+' '+mg.y+'</span><button class="mcopy-btn" onclick="copyMonth('+mg.y+','+mg.m+',this)">⧉</button></div>';
    for(var ii=0;ii<mg.items.length;ii++){
      var item=mg.items[ii],e=item.ev,d=item.date,cat=getCat(e.category);
      var isToday=d.getTime()===now.getTime();

// ── FIRESTORE REST ────────────────────────────────────
function fsUrl(docPath) {
  return 'https://firestore.googleapis.com/v1/projects/' + FB_PROJECT +
         '/databases/(default)/documents/' + docPath + '?key=' + FB_API_KEY;
}

function toFields(obj){ var f={}; Object.keys(obj).forEach(function(k){ f[k]=toVal(obj[k]); }); return f; }
function toVal(v){
  if(v===null||v===undefined) return {nullValue:null};
  if(typeof v==='boolean')    return {booleanValue:v};
  if(typeof v==='number')     return {integerValue:''+v};
  if(typeof v==='string')     return {stringValue:v};
  if(Array.isArray(v))        return {arrayValue:{values:v.map(toVal)}};
  if(typeof v==='object')     return {mapValue:{fields:toFields(v)}};
  return {stringValue:''+v};
}
function fromFields(fields){ if(!fields) return {}; var obj={}; Object.keys(fields).forEach(function(k){ obj[k]=fromVal(fields[k]); }); return obj; }
function fromVal(v){
  if(!v) return null;
  if('nullValue'    in v) return null;
  if('booleanValue' in v) return v.booleanValue;
  if('integerValue' in v) return Number(v.integerValue);
  if('doubleValue'  in v) return v.doubleValue;
  if('stringValue'  in v) return v.stringValue;
  if('arrayValue'   in v) return (v.arrayValue.values||[]).map(fromVal);
  if('mapValue'     in v) return fromFields(v.mapValue.fields||{});
  return null;
}
var FS_BASE='https://firestore.googleapis.com/v1/projects/'+FB_PROJECT+'/databases/(default)/documents/';
function fsGet(path,token){ return fetch(FS_BASE+path,{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.ok?r.json():null;}); }
function fsSave(path,token,data){ return fetch(FS_BASE+path+'?key='+FB_API_KEY,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({fields:toFields(data)})}); }
function fsWrite(docPath,data){
  if(!_token) return;
  fsSave(docPath,_token,{events:data,updatedAt:Date.now()}).then(function(r){
    if(!r.ok) r.text().then(function(t){console.error('fsWrite error',r.status,t);});
  }).catch(function(e){console.error('fsWrite failed',e);});
}

function fsRead(docPath,cb){
  if(!_token){cb(null);return;}
  fsGet(docPath,_token).then(function(doc){
    if(!doc||!doc.fields){cb(null);return;}
    var data=fromFields(doc.fields);
    if(data.events&&Array.isArray(data.events)) cb(data.events);
    else if(doc.fields.eventsJson&&doc.fields.eventsJson.stringValue){
      try{cb(JSON.parse(doc.fields.eventsJson.stringValue));}catch(e){cb(null);}
    } else cb(null);
  }).catch(function(){cb(null);});
}

function isAdmin() { return _user && _user.email === ADMIN_EMAIL; }

function loadFromFirestore(){
  render(); // show localStorage immediately
  if(!_token||!_user) return;
  var uid=btoa(_user.email).replace(/=/g,'');
  fsRead('chronos/users_'+uid,function(userEvts){
    fsRead('chronos/adminEvents',function(adminEvts){
      var seeds=events.filter(function(e){return e.category==='lunar'||e.category==='solar';});
      var personal=userEvts&&userEvts.length?userEvts:events.filter(function(e){return e.category!=='lunar'&&e.category!=='solar'&&!e.isAdmin;});
      var admin=[];
      if(adminEvts&&adminEvts.length) admin=adminEvts.map(function(e){e.isAdmin=true;e.isPublic=true;return e;});
      // Admin/public events take priority — remove from personal if same id exists in admin
      var adminIds={};
      admin.forEach(function(e){adminIds[e.id]=true;});
      personal=personal.filter(function(e){return !adminIds[e.id];});
      var allIds={};
      personal.forEach(function(e){allIds[e.id]=true;});
      admin.forEach(function(e){allIds[e.id]=true;});
      var newSeeds=seeds.filter(function(e){return !allIds[e.id];});
      events=personal.concat(admin).concat(newSeeds);
      try{localStorage.setItem('ch4d_events',JSON.stringify(events));}catch(ex){}
      showToast('✓ Loaded!');
      render();
    });
  });
}

function syncNow() {
  if (!_token || !_user) return;
  _lastUpdatedAt = Date.now();
  var uid = btoa(_user.email).replace(/=/g,'');
  if (isAdmin()) {
    // Public admin events → everyone sees them
    var publicEvts = events.filter(function(e) { return e.isPublic; });
    fsWrite('chronos/adminEvents', publicEvts);
    // Private admin events → only saved to admin's personal doc
    var nonPublic = events.filter(function(e) { return !e.isPublic; });
    fsWrite('chronos/users_' + uid, nonPublic);
  } else {
    var personalEvts = events.filter(function(e) { return !e.isAdmin; });
    fsWrite('chronos/users_' + uid, personalEvts);
  }
  showToast('✓ Synced!');
}

// ── MIGRATE old localStorage keys into current key ───
function migrateStorage() {
  var OLD_KEYS = ['ch_events','ch3_events','ch4_events','ch4b_events','ch4c_events','ch4d_events'];
  var current = [];
  try { current = JSON.parse(localStorage.getItem('ch4d_events') || '[]'); } catch(e){ current = []; }
  var currentIds = {};
  for (var i=0; i<current.length; i++) currentIds[current[i].id] = true;

  var merged = false;
  for (var k=0; k<OLD_KEYS.length; k++) {
    var raw = localStorage.getItem(OLD_KEYS[k]);
    if (!raw) continue;
    try {
      var old = JSON.parse(raw);
      for (var j=0; j<old.length; j++) {
        if (!currentIds[old[j].id]) {
          current.push(old[j]);
          currentIds[old[j].id] = true;
          merged = true;
        }
      }
    } catch(e) {}
  }
  if (merged) {
    try { localStorage.setItem('ch4d_events', JSON.stringify(current)); } catch(e){}
  }
}

function buildMonthText(year, month) {
  var savedTime = timeFilter;

    return item.date.getFullYear() === year && item.date.getMonth() === month;
  });
  timeFilter = savedTime;
  if (!allItems.length) return '';
  var lines = [MONTHS[month] + ' ' + year, ''];
  var lastDay = -1;
  for (var i = 0; i < allItems.length; i++) {
    var item = allItems[i], e = item.ev, d = item.date;
    if (d.getDate() !== lastDay) {
      if (lastDay !== -1) lines.push('');
      lines.push(DNAMES[d.getDay()] + ' ' + MONTHS_S[d.getMonth()] + ' ' + d.getDate());
      lastDay = d.getDate();
    }
    var name = stripEmoji(e.name);
    var time = e.time ? ' - ' + fmtTime(e.time) : '';
    var note = e.notes ? ' (' + e.notes + ')' : '';
    var age  = e.birthYear ? ' - turns ' + (year - parseInt(e.birthYear)) : '';
    lines.push('  ' + name + time + age + note);
  }
  return lines.join('\n');
}

function copyText(text, onSuccess, onFail) {
  var ok=false;
  try {
    var ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;top:0;left:0;width:2px;height:2px;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,text.length);
    ok=document.execCommand('copy'); document.body.removeChild(ta);
  } catch(ex){ ok=false; }
  if(ok){ if(onSuccess) onSuccess(); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ if(onSuccess) onSuccess(); }).catch(function(){ if(onFail) onFail(); });
    return;
  }
  if(onFail) onFail();
}

function copyMonth(year, month, btn) {
  var savedTime=timeFilter; timeFilter='all';
  var allItems=getFiltered().filter(function(item){
    return item.date.getFullYear()===year && item.date.getMonth()===month;
  });
  timeFilter=savedTime;
  if(!allItems.length) return;
  var lines=[MONTHS[month]+' '+year,''], lastDay=-1;
  for(var i=0;i<allItems.length;i++){
    var item=allItems[i],e=item.ev,d=item.date;
    if(d.getDate()!==lastDay){
      if(lastDay!==-1) lines.push('');
      lines.push(DNAMES[d.getDay()]+' '+MONTHS_S[d.getMonth()]+' '+d.getDate());
      lastDay=d.getDate();
    }
    lines.push('  '+stripEmoji(e.name)+(e.time&&(e.category==='lunar'||e.category==='solar')?' - '+fmtTime(e.time):'')+(e.birthYear?' (b. '+e.birthYear+')':'')+(e.notes?' ('+e.notes+')':''));
  }
  var txt=lines.join('\n'), orig=btn?btn.textContent:'⧉';
  copyText(txt,
    function(){ if(btn){ btn.textContent='\u2713 Copied!'; btn.style.color='var(--gold)'; setTimeout(function(){ btn.textContent=orig; btn.style.color=''; },2000); } },
    function(){ if(btn){ btn.textContent='\u2717 Failed'; btn.style.color='red'; setTimeout(function(){ btn.textContent=orig; btn.style.color=''; },2000); } }
  );
}


function exportData(){
  var personal=events.filter(function(e){return e.category!=='lunar'&&e.category!=='solar';});
  var rows=['id,name,date,time,category,recur,notes,birthYear,bRel,isPublic'];
  personal.forEach(function(e){
    rows.push([e.id||'',e.name||'',e.date||'',e.time||'',e.category||'',e.recur||'once',(e.notes||'').replace(/,/g,';'),e.birthYear||'',e.bRel||'',e.isPublic?'true':'false'].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(','));
  });
  var csv=rows.join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='chronos-backup-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('✓ Exported '+personal.length+' events!');
}
function importData(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var lines=e.target.result.split('\n').filter(function(l){return l.trim();});
      if(lines.length<2){showToast('Empty file');return;}
      var headers=lines[0].replace(/"/g,'').split(',');
      var existingIds={};
      events.forEach(function(ev){existingIds[ev.id]=true;});
      var added=0;
      for(var i=1;i<lines.length;i++){
        var vals=lines[i].match(/("(?:[^"]|"")*"|[^,]*)/g)||[];
        vals=vals.filter(function(v,idx){return idx%2===0;}).map(function(v){return v.replace(/^"|"$/g,'').replace(/""/g,'"');});
        var ev={};
        headers.forEach(function(h,hi){ev[h.trim()]=vals[hi]||'';});
        if(!ev.name||!ev.date) continue;
        if(!ev.id) ev.id='i'+Date.now()+i;
        if(existingIds[ev.id]) continue;
        if(ev.isPublic) ev.isPublic=ev.isPublic==='true';
        events.push(ev); existingIds[ev.id]=true; added++;
      }
      try{localStorage.setItem('ch4d_events',JSON.stringify(events));}catch(ex){}
      if(_token&&_user) syncNow();
      render();
      showToast('✓ Imported '+added+' events!');
    }catch(ex){showToast('Import failed');}
  };
  reader.readAsText(file);
  input.value='';
}

function renderCalView() {
  var cv=document.getElementById('calView');
  if(!cv||cv.style.display==='none') return;
  var y=_calDate.getFullYear(), m=_calDate.getMonth();
  var today=today0();
  var moonMap={},nameMap={},phaseList=[];
  events.forEach(function(e){
    if(e.category!=='lunar'&&e.category!=='solar') return;
    var d=new Date(e.date+'T00:00:00');
    if(d.getFullYear()!==y||d.getMonth()!==m) return;
    var icon=e.name.indexOf('🌑')>=0?'🌑':e.name.indexOf('🌓')>=0?'🌓':e.name.indexOf('🌕')>=0?'🌕':e.name.indexOf('🌗')>=0?'🌗':e.name.indexOf('🌸')>=0?'🌸':e.name.indexOf('☀️')>=0?'☀️':e.name.indexOf('🍂')>=0?'🍂':e.name.indexOf('❄️')>=0?'❄️':'';
    if(icon){var cn=stripEmoji(e.name);moonMap[d.getDate()]=icon;nameMap[d.getDate()]=cn;phaseList.push({day:d.getDate(),icon:icon,name:cn,notes:e.notes||''});}
  });
  phaseList.sort(function(a,b){return a.day-b.day;});
  var evMap={};
  events.forEach(function(e){
    if(e.category==='lunar'||e.category==='solar') return;
    var d=new Date(e.date+'T00:00:00');
    if(d.getFullYear()!==y||d.getMonth()!==m) return;
    var cat=getCat(e.category);
    if(!evMap[d.getDate()]) evMap[d.getDate()]=[];
    evMap[d.getDate()].push(cat.color);
  });
  var html='<div class="cal-nav"><button class="cal-nav-btn" onclick="calMove(-1)">‹</button><div class="cal-month-title">'+MONTHS[m]+' '+y+'</div><button class="cal-nav-btn" onclick="calMove(1)">›</button></div>';
  html+='<div class="cal-grid">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  for(var p=first-1;p>=0;p--) html+='<div class="cal-day other-month"><span class="cal-num">'+(prev-p)+'</span></div>';
  for(var day=1;day<=days;day++){
    var isT=new Date(y,m,day).getTime()===today.getTime();
    html+='<div class="cal-day'+(isT?' today-day':'')+'"><span class="cal-num">'+day+'</span>';
    if(moonMap[day]){
      var short=nameMap[day].replace('First Quarter','1st Qtr').replace('Last Quarter','Last Qtr').replace('New Moon','New').replace('Full Moon','Full');
      html+='<span class="cal-moon">'+moonMap[day]+'</span><span class="cal-mlabel">'+short+'</span>';
    }
    if(evMap[day]){html+='<div style="display:flex;gap:2px;margin-top:2px;">';evMap[day].slice(0,3).forEach(function(c){html+='<div style="width:4px;height:4px;border-radius:50%;background:'+c+'"></div>';});html+='</div>';}
    html+='</div>';
  }
  var rem=(7-((first+days)%7))%7;
  for(var n=1;n<=rem;n++) html+='<div class="cal-day other-month"><span class="cal-num">'+n+'</span></div>';
  html+='</div>';
  if(phaseList.length){
    html+='<div class="phase-section"><div class="phase-hdr">Moon Phases</div>';
    phaseList.forEach(function(p){
      var ord=p.day+(p.day===1||p.day===21||p.day===31?'st':p.day===2||p.day===22?'nd':p.day===3||p.day===23?'rd':'th');
      var pDate=new Date(_calDate.getFullYear(),_calDate.getMonth(),p.day); var pDay=DNAMES[pDate.getDay()]; html+='<div class="phase-item"><span style="font-size:20px;width:26px;text-align:center;">'+p.icon+'</span><div><div style="font-size:13px;font-weight:600;color:var(--text);">'+pDay+' · '+MONTHS_S[m]+' '+ord+' · '+p.name+'</div>'+(p.notes?'<div style="font-size:11px;color:var(--muted);">'+p.notes+'</div>':'')+' </div></div>';
    });
    html+='</div>';
  }
  cv.innerHTML=html;
}

function calMove(dir){_calDate.setMonth(_calDate.getMonth()+dir);renderCalView();}


var _unsubscribe = null;
var _lastUpdatedAt = 0;

function startRealtime() {
  if (!_token || !_user) return;
  stopRealtime();
  var uid = btoa(_user.email).replace(/=/g,'');
  // Firebase SDK preloaded at init — use immediately if ready
  if (window._firebaseReady || (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length)) {
    subscribeSnapshot(uid);
  } else {
    // Wait up to 5s for SDK then fall back to polling
    var attempts = 0;
    var check = setInterval(function(){
      attempts++;
      if (window._firebaseReady || (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length)) {
        clearInterval(check);
        subscribeSnapshot(uid);
      } else if (attempts > 10) {
        clearInterval(check);
        startPolling(uid);
      }
    }, 500);
  }
}

function subscribeSnapshot(uid) {
  try {
    var db = firebase.firestore();
    var unsubFn = db.collection('chronos').doc('users_' + uid).onSnapshot(function(doc) {
      if (!doc.exists) return;
      var data = doc.data();
      if (!data || !data.events) return;
      var cloudTime = data.updatedAt || 0;
      if (cloudTime <= _lastUpdatedAt) return; // our own save, ignore
      _lastUpdatedAt = cloudTime;
      var seeds = events.filter(function(e){ return e.category==='lunar'||e.category==='solar'; });
      var personal = Array.isArray(data.events) ? data.events : [];
      var allIds = {};
      personal.forEach(function(e){ allIds[e.id]=true; });
      var newSeeds = seeds.filter(function(e){ return !allIds[e.id]; });
      events = personal.concat(newSeeds);
      try { localStorage.setItem('ch4d_events', JSON.stringify(events)); } catch(ex){}
      render();
      showToast('\u2713 Updated!');
    }, function(err) {
      console.error('onSnapshot error', err);
      startPolling(uid);
    });
    _unsubscribe = unsubFn;
  } catch(e) { startPolling(uid); }
}

function startPolling(uid) {
  _unsubscribe = setInterval(function() {
    if (!_token || !_user) { stopRealtime(); return; }
    loadFromFirestore();
  }, 3000);
}

function stopRealtime() {
  if (_unsubscribe) {
    if (typeof _unsubscribe === 'function') _unsubscribe();
    else clearInterval(_unsubscribe);
    _unsubscribe = null;
  }
}
